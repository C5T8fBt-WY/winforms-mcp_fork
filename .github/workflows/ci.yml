name: CI

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:
  build-and-test:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Restore dependencies
      run: dotnet restore C5T8fBtWY.WinFormsMcp.sln

    - name: Build
      run: dotnet build C5T8fBtWY.WinFormsMcp.sln --configuration Release --no-restore

    - name: Run tests with coverage
      run: dotnet test C5T8fBtWY.WinFormsMcp.sln --configuration Release --no-build --logger "console;verbosity=minimal" --collect:"XPlat Code Coverage" --results-directory ./TestResults

    - name: Upload coverage reports
      uses: codecov/codecov-action@v5
      if: always()
      with:
        directory: ./TestResults
        flags: unittests
        name: codecov-umbrella
        fail_ci_if_error: false

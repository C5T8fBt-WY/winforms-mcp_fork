name: Auto Version & Publish to npm

on:
  workflow_dispatch:
  push:
    branches:
      - master
    paths-ignore:
      - "**.md"
      - "docs/**"

# Cancel previous runs if a new one is triggered
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  version-and-publish:
    # Skip if commit message contains [skip ci]
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    runs-on: windows-2022
    permissions:
      contents: write
      id-token: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Full history for git tags
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - uses: actions/setup-node@v4
        with:
          node-version: "20.x"
          registry-url: "https://registry.npmjs.org"

      # Ensure npm 11.5.1+ for trusted publishing
      - name: Upgrade npm
        run: npm install -g npm@latest || echo "npm upgrade failed (non-critical), continuing with bundled version"
        shell: bash

      - name: Configure Git
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
        shell: bash

      - name: Get latest git tag version
        id: get_version
        run: |
          # Get the latest version tag (e.g., v1.2.3)
          LATEST_TAG=$(git tag -l 'v*' --sort=-v:refname | head -n 1 || echo '')

          if [ -z "$LATEST_TAG" ]; then
            # No tags yet — seed from VERSION file
            CURRENT_VERSION=$(cat VERSION 2>/dev/null || echo "1.0.5")
            CURRENT_VERSION=$(echo "$CURRENT_VERSION" | tr -d '[:space:]')
            echo "current=$CURRENT_VERSION" >> $GITHUB_OUTPUT
            echo "new=$CURRENT_VERSION" >> $GITHUB_OUTPUT
            echo "tag_exists=false" >> $GITHUB_OUTPUT
          else
            # Extract version number (remove 'v' prefix)
            CURRENT_VERSION=${LATEST_TAG#v}
            echo "current=$CURRENT_VERSION" >> $GITHUB_OUTPUT

            # Check if HEAD is already tagged (|| echo '' avoids pipefail on grep-no-match)
            HEAD_TAG=$(git tag --points-at HEAD | grep '^v' | head -n 1 || echo '')
            if [ -n "$HEAD_TAG" ]; then
              echo "new=$CURRENT_VERSION" >> $GITHUB_OUTPUT
              echo "tag_exists=true" >> $GITHUB_OUTPUT
            # Skip if this was a release commit (avoid infinite loop)
            elif git log -1 --pretty=%B | grep -qE '^chore\(release\):'; then
              echo "Release commit detected, skipping version bump"
              echo "new=$CURRENT_VERSION" >> $GITHUB_OUTPUT
              echo "tag_exists=true" >> $GITHUB_OUTPUT
            else
              # Increment patch version
              IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT_VERSION"
              NEW_PATCH=$((PATCH + 1))
              NEW_VERSION="$MAJOR.$MINOR.$NEW_PATCH"
              echo "new=$NEW_VERSION" >> $GITHUB_OUTPUT
              echo "tag_exists=false" >> $GITHUB_OUTPUT
            fi
          fi

          echo "Latest tag: $LATEST_TAG"
          echo "New version will be: $NEW_VERSION"
        shell: bash

      - name: Update VERSION file and npm/package.json
        if: steps.get_version.outputs.tag_exists == 'false'
        run: |
          $newVersion = "${{ steps.get_version.outputs.new }}"

          # Update VERSION file (used by .csproj for NuGet versioning)
          Set-Content -Path "VERSION" -Value $newVersion -NoNewline

          # Update npm/package.json version
          $pkg = Get-Content "npm/package.json" -Raw | ConvertFrom-Json
          $pkg.version = $newVersion
          $pkg | ConvertTo-Json -Depth 10 | Set-Content "npm/package.json"

          Write-Host "Updated VERSION and npm/package.json to $newVersion"
        shell: pwsh

      - name: Restore, Build, Test
        run: |
          dotnet restore C5T8fBtWY.WinFormsMcp.sln
          dotnet build C5T8fBtWY.WinFormsMcp.sln --configuration Release --no-restore
          dotnet test C5T8fBtWY.WinFormsMcp.sln --configuration Release --no-build --logger "console;verbosity=minimal"
        shell: pwsh

      - name: Copy binaries to npm/dist
        run: |
          New-Item -ItemType Directory -Force -Path "npm/dist" | Out-Null
          $outDir = "src/Rhombus.WinFormsMcp.Server/bin/Release/net8.0-windows"
          # Copy all runtime-required files (exe, dll, json config, runtimes/ dir)
          Get-ChildItem -Path $outDir -Filter "*.exe" | Copy-Item -Destination "npm/dist/" -Force
          Get-ChildItem -Path $outDir -Filter "*.dll" | Copy-Item -Destination "npm/dist/" -Force
          Get-ChildItem -Path $outDir -Filter "*.json" | Copy-Item -Destination "npm/dist/" -Force
          if (Test-Path "$outDir/runtimes") {
            Copy-Item -Path "$outDir/runtimes" -Destination "npm/dist/runtimes" -Recurse -Force
          }
          Write-Host "Binaries copied to npm/dist:"
          Get-ChildItem -Path "npm/dist" -Recurse | Select-Object FullName, Length
        shell: pwsh

      - name: Create and push new tag
        if: steps.get_version.outputs.tag_exists == 'false'
        run: |
          NEW_VERSION="${{ steps.get_version.outputs.new }}"

          # Commit the version update
          git add VERSION npm/package.json
          git commit -m "chore(release): v${NEW_VERSION} [skip ci]" || echo "No changes to commit"

          # Create tag and push
          git tag -a "v${NEW_VERSION}" -m "Release v${NEW_VERSION}"
          git push origin master
          git push origin "v${NEW_VERSION}"

          echo "Created and pushed tag v${NEW_VERSION}"
        shell: bash

      - name: Create GitHub Release
        if: steps.get_version.outputs.tag_exists == 'false'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ steps.get_version.outputs.new }}
          name: Release v${{ steps.get_version.outputs.new }}
          generate_release_notes: true

      - name: Publish to npm
        working-directory: npm
        run: npm publish --access public --provenance
        # npm Trusted Publishing via OIDC — no NPM_TOKEN secret needed.
        # Setup required on npmjs.com: package → Settings → Publishing access → Allow GitHub Actions
